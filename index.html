<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Hola! 西班牙文小教室</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Baloo+2:wght@700;800&family=Noto+Sans+TC:wght@500;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', 'Nunito', sans-serif; background: #fff9f0; min-height: 100vh; }

  /* ══════════════════════════════
     COVER
  ══════════════════════════════ */
  #cover {
    position: fixed; inset: 0; z-index: 999;
    background: #f0f7ee;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 40px 24px;
    transition: opacity 0.5s ease;
    overflow: hidden;
  }
  #cover.hide { opacity: 0; pointer-events: none; }

  .cover-grass {
    position: absolute; bottom: 0; left: 0; right: 0; height: 120px;
    background: #c8e6b0;
    border-radius: 60% 60% 0 0 / 40px 40px 0 0;
  }
  .cover-grass-front {
    position: absolute; bottom: 0; left: 0; right: 0; height: 70px;
    background: #a8d888;
    border-radius: 50% 50% 0 0 / 30px 30px 0 0;
  }
  .cover-cloud {
    position: absolute; background: white;
    border-radius: 999px; opacity: 0.8;
  }
  .cloud1 { width:80px; height:28px; top:10%; left:8%; }
  .cloud1::before { content:''; position:absolute; width:40px; height:40px; background:white; border-radius:50%; top:-18px; left:12px; }
  .cloud1::after  { content:''; position:absolute; width:28px; height:28px; background:white; border-radius:50%; top:-10px; left:36px; }
  .cloud2 { width:60px; height:22px; top:16%; right:10%; }
  .cloud2::before { content:''; position:absolute; width:30px; height:30px; background:white; border-radius:50%; top:-14px; left:10px; }
  .cloud2::after  { content:''; position:absolute; width:20px; height:20px; background:white; border-radius:50%; top:-8px; left:30px; }
  /* 草叢 */
  .cover-grass-blades {
    position: absolute; bottom: 62px; left: 0; right: 0;
    display: flex; justify-content: space-around;
    padding: 0 16px; pointer-events: none; align-items: flex-end;
  }
  .blade {
    width: 8px; border-radius: 999px 999px 2px 2px;
    background: #7cc44a; transform-origin: bottom center;
  }
  .blade:nth-child(odd)  { height: 32px; background: #6aba3e; -webkit-transform: rotate(-8deg); transform: rotate(-8deg); }
  .blade:nth-child(even) { height: 22px; background: #8fd458; -webkit-transform: rotate(6deg);  transform: rotate(6deg); }
  .blade:nth-child(3n)   { height: 40px; background: #5faa30; -webkit-transform: rotate(-4deg); transform: rotate(-4deg); }

  .cover-llama {
    font-size: 6rem; position: relative; z-index: 2; margin-bottom: 6px;
    -webkit-animation: llamaFloat 3s ease-in-out infinite;
    animation: llamaFloat 3s ease-in-out infinite;
  }
  @-webkit-keyframes llamaFloat {
    0%,100% { -webkit-transform:translateY(0); transform:translateY(0); }
    50%      { -webkit-transform:translateY(-10px); transform:translateY(-10px); }
  }
  @keyframes llamaFloat {
    0%,100% { transform:translateY(0); }
    50%      { transform:translateY(-10px); }
  }
  .cover-title {
    font-family: 'Baloo 2', cursive;
    font-size: 3rem; font-weight: 800;
    color: #3a6b35; line-height: 1.1;
    position: relative; z-index: 2;
  }
  .cover-title span { color: #6aba47; }
  .cover-sub {
    font-size: 0.95rem; color: #6a8f60;
    margin-top: 8px; margin-bottom: 28px; line-height: 1.7;
    position: relative; z-index: 2;
    font-family: 'Noto Sans TC', sans-serif; font-weight: 500;
  }
  .cover-btn {
    background: #5aaa2e; border: none; border-radius: 999px;
    padding: 15px 44px; font-family: 'Baloo 2', cursive;
    font-size: 1.2rem; font-weight: 800; color: white; cursor: pointer;
    box-shadow: 0 6px 0 #3d8020, 0 8px 20px rgba(90,170,46,0.3);
    transition: transform 0.12s, box-shadow 0.12s;
    -webkit-tap-highlight-color: transparent;
    position: relative; z-index: 2;
  }
  .cover-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #3d8020; }
  .cover-lang { position:relative; z-index:2; margin-top:18px; font-size:0.76rem; color:#8aab75; letter-spacing:2px; }

  /* ══════════════════════════════
     MAIN APP
  ══════════════════════════════ */
  #app { padding: 20px 14px 60px; }
  header { text-align: center; margin-bottom: 18px; }
  header h1 {
    font-family: 'Baloo 2', cursive; font-size: 2rem;
    background: linear-gradient(135deg,#FF6B6B,#FFD93D,#6BCB77,#4D96FF);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  header p { color: #999; font-size: 0.85rem; margin-top: 4px; }
  #voiceInfo { font-size: 0.72rem; color: #ccc; margin-top: 3px; min-height: 1em; }

  .tabs-wrapper { max-width: 980px; margin: 0 auto 16px; }
  .tab-group-label {
    text-align: center; font-size: 0.68rem; font-weight: 700;
    letter-spacing: .1em; color: #bbb; text-transform: uppercase; margin: 10px 0 6px;
  }
  .tabs { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
  .tab {
    padding: 6px 14px; border-radius: 999px; border: none;
    cursor: pointer; font-family: 'Noto Sans TC', 'Nunito', sans-serif;
    font-weight: 700; font-size: 0.82rem;
    background: white; color: #555;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    white-space: nowrap; transition: transform 0.15s, box-shadow 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .tab:active { transform: scale(0.94); }
  .tab.active { color: white; }
  .tab[data-cat="numbers"].active { background:#FF6B6B; }
  .tab[data-cat="days"].active    { background:#FF9F43; }
  .tab[data-cat="months"].active  { background:#F5C518; color:#444; }
  .tab[data-cat="colors"].active  { background:#6BCB77; }
  .tab[data-cat="shapes"].active  { background:#4D96FF; }
  .tab[data-cat="basics"].active  { background:#A855F7; }
  .tab[data-cat="animals"].active { background:#14B8A6; }
  .tab[data-cat="body"].active    { background:#F43F5E; }
  .tab[data-cat="food"].active    { background:#EF7C35; }
  .tab[data-cat="people"].active  { background:#8B5CF6; }

  .search-wrap { max-width:320px; margin:0 auto 16px; position:relative; }
  .search-wrap input {
    width:100%; padding:9px 16px 9px 38px;
    border-radius:999px; border:2px solid #eee;
    font-family:'Noto Sans TC','Nunito',sans-serif; font-size:0.9rem; outline:none; background:white;
  }
  .search-wrap input:focus { border-color:#4D96FF; }
  .search-icon { position:absolute; left:13px; top:50%; transform:translateY(-50%); font-size:0.95rem; pointer-events:none; }

  .grid {
    display: grid; gap: 12px; max-width: 980px; margin: 0 auto;
    grid-template-columns: repeat(4, 1fr);
  }
  @media (min-width:700px)  { .grid { grid-template-columns: repeat(5,1fr); } }
  @media (min-width:900px)  { .grid { grid-template-columns: repeat(6,1fr); } }

  /* CARD */
  .card {
    background: white; border-radius: 16px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.09);
    padding: 14px 10px 26px; text-align: center;
    cursor: pointer; position: relative; overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    opacity: 0;
    -webkit-animation: cardIn 0.35s ease forwards;
    animation: cardIn 0.35s ease forwards;
  }
  @-webkit-keyframes cardIn {
    from { opacity:0; -webkit-transform:translateY(14px); transform:translateY(14px); }
    to   { opacity:1; -webkit-transform:translateY(0);    transform:translateY(0); }
  }
  @keyframes cardIn {
    from { opacity:0; transform:translateY(14px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .card:active { transform: scale(0.95); }

  .card-pop {
    -webkit-animation: cardPop 0.22s ease !important;
    animation: cardPop 0.22s ease !important;
  }
  @-webkit-keyframes cardPop {
    0%   { -webkit-transform:scale(1); }
    50%  { -webkit-transform:scale(1.12); }
    100% { -webkit-transform:scale(1); }
  }
  @keyframes cardPop {
    0%   { transform:scale(1); }
    50%  { transform:scale(1.12); }
    100% { transform:scale(1); }
  }

  .card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:4px;
  }
  .cat-numbers .card::before { background:#FF6B6B; }
  .cat-days    .card::before { background:#FF9F43; }
  .cat-months  .card::before { background:#F5C518; }
  .cat-colors  .card::before { background:#6BCB77; }
  .cat-shapes  .card::before { background:#4D96FF; }
  .cat-basics  .card::before { background:#A855F7; }
  .cat-animals .card::before { background:#14B8A6; }
  .cat-body    .card::before { background:#F43F5E; }
  .cat-food    .card::before { background:#EF7C35; }
  .cat-people  .card::before { background:#8B5CF6; }
  .cat-search  .card::before { background:#4D96FF; }

  .card .visual { font-size:1.9rem; margin-bottom:6px; min-height:44px; display:flex; align-items:center; justify-content:center; }
  .card .color-swatch { width:44px; height:44px; border-radius:50%; margin:0 auto 6px; border:2px solid rgba(0,0,0,0.07); }
  .card .shape-svg { width:44px; height:44px; margin:0 auto 6px; display:block; }
  .card .num-display { font-family:'Baloo 2',cursive; font-size:1.8rem; font-weight:800; color:#FF6B6B; line-height:1; margin-bottom:2px; }
  .dot-grid { display:flex; flex-wrap:wrap; gap:3px; justify-content:center; max-width:40px; margin:0 auto 4px; }
  .dot { width:7px; height:7px; border-radius:50%; background:#FF6B6B; }
  .card .es { font-family:'Baloo 2',cursive; font-size:1rem; font-weight:800; color:#333; line-height:1.2; }
  .card .zh { font-size:0.72rem; color:#aaa; margin-top:3px; font-family:'Noto Sans TC',sans-serif; font-weight:700; }
  .card .en { font-size:0.66rem; color:#ccc; margin-top:1px; }
  .card .speak-btn { position:absolute; bottom:6px; right:6px; width:22px; height:22px; border-radius:50%; background:#f0f0f0; display:flex; align-items:center; justify-content:center; font-size:0.75rem; }

  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#222; color:white; padding:8px 18px; border-radius:999px; font-size:0.84rem; opacity:0; pointer-events:none; transition:opacity .25s; z-index:998; white-space:nowrap; }
  .toast.show { opacity:1; }
</style>
</head>
<body>

<!-- COVER -->
<div id="cover">
  <div class="cover-cloud cloud1"></div>
  <div class="cover-cloud cloud2"></div>
  <div class="cover-llama">🦙</div>
  <div class="cover-title">¡<span>Hola</span>!<br>西班牙文小教室</div>
  <div class="cover-sub">跟羊駝一起學西班牙文 🌿<br>點卡片就會說話！</div>
  <button class="cover-btn" id="startBtn">開始學習 ▶</button>
  <div class="cover-lang">🇪🇸 español · 🇨🇳 中文 · 🇺🇸 english</div>
  <div class="cover-grass"></div>
  <div class="cover-grass-front"></div>
  <div class="cover-grass-blades">
    <div class="blade"></div><div class="blade"></div><div class="blade"></div>
    <div class="blade"></div><div class="blade"></div><div class="blade"></div>
    <div class="blade"></div><div class="blade"></div><div class="blade"></div>
    <div class="blade"></div><div class="blade"></div><div class="blade"></div>
    <div class="blade"></div><div class="blade"></div><div class="blade"></div>
    <div class="blade"></div><div class="blade"></div><div class="blade"></div>
    <div class="blade"></div><div class="blade"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <h1>¡Hola! 西班牙文小教室</h1>
    <p>點卡片就會說話 🔊 · Tap any card to hear it!</p>
    <p id="voiceInfo"></p>
  </header>
  <div class="tabs-wrapper">
    <div class="tab-group-label">基礎 Basics</div>
    <div class="tabs" id="tabs-basic"></div>
    <div class="tab-group-label">詞彙 Vocabulary</div>
    <div class="tabs" id="tabs-vocab"></div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="搜尋單字 · search">
  </div>
  <div class="grid" id="grid"></div>
</div>

<div class="toast" id="toast"></div>

function shapeSVG(shape, color) {
  var c = color || '#4D96FF';
  if(shape === 'circle')    return '<svg viewBox="0 0 52 52"><circle cx="26" cy="26" r="22" fill="'+c+'"/></svg>';
  if(shape === 'square')    return '<svg viewBox="0 0 52 52"><rect x="6" y="6" width="40" height="40" rx="4" fill="'+c+'"/></svg>';
  if(shape === 'triangle')  return '<svg viewBox="0 0 52 52"><polygon points="26,4 50,48 2,48" fill="'+c+'"/></svg>';
  if(shape === 'rectangle') return '<svg viewBox="0 0 52 52"><rect x="3" y="13" width="46" height="26" rx="4" fill="'+c+'"/></svg>';
  if(shape === 'star')      return '<svg viewBox="0 0 52 52"><polygon points="26,3 32,19 49,19 36,30 41,47 26,37 11,47 16,30 3,19 20,19" fill="'+c+'"/></svg>';
  if(shape === 'heart')     return '<svg viewBox="0 0 52 52"><path d="M26,44 C26,44 5,30 5,17 C5,10 10,5 18,7 C22,8 26,12 26,12 C26,12 30,8 34,7 C42,5 47,10 47,17 C47,30 26,44 26,44Z" fill="'+c+'"/></svg>';
  if(shape === 'oval')      return '<svg viewBox="0 0 52 52"><ellipse cx="26" cy="26" rx="23" ry="14" fill="'+c+'"/></svg>';
  return '';
}

function numVisual(n) {
  if(n > 10) return '<div class="num-display">'+n+'</div>';
  if(n === 0) return '<div class="num-display">0</div>';
  var dots = '';
  for(var i = 0; i < n; i++) { dots += '<div class="dot"></div>'; }
  return '<div class="dot-grid">'+dots+'</div>';
}

var esVoice = null;
function loadVoice() {
  var voices = speechSynthesis.getVoices();
  esVoice =
    voices.filter(function(v){ return v.lang === 'es-ES' && /helena|monica|paulina/i.test(v.name); })[0] ||
    voices.filter(function(v){ return v.lang === 'es-ES'; })[0] ||
    voices.filter(function(v){ return v.lang === 'es-MX'; })[0] ||
    voices.filter(function(v){ return v.lang.indexOf('es') === 0; })[0] || null;
  var el = document.getElementById('voiceInfo');
  if(el && esVoice) el.textContent = '🎙 ' + esVoice.name + ' (' + esVoice.lang + ')';
}
if(typeof speechSynthesis !== 'undefined') {
  speechSynthesis.onvoiceschanged = loadVoice;
  loadVoice();
}

function speak(text) {
  if(typeof speechSynthesis === 'undefined') return;
  speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  u.lang = 'es-ES'; u.rate = 0.82; u.pitch = 1.05;
  if(esVoice) u.voice = esVoice;
  speechSynthesis.speak(u);
}

var toastTimer;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = '🔊 ' + msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 1800);
}

function buildCard(item, cat, delay) {
  var card = document.createElement('div');
  card.className = 'card';
  card.style.WebkitAnimationDelay = delay + 's';
  card.style.animationDelay = delay + 's';

  var visual = '';
  if(cat === 'colors' && item.color !== undefined) {
    visual = '<div class="color-swatch" style="background:' + item.color + '"></div>';
  } else if(item.shape) {
    visual = '<div class="shape-svg">' + shapeSVG(item.shape, item.color) + '</div>';
  } else if(item.n !== undefined) {
    visual = '<div class="visual">' + numVisual(item.n) + '</div>';
  } else if(item.emoji) {
    visual = '<div class="visual">' + item.emoji + '</div>';
  }

  card.innerHTML = visual +
    '<div class="es">' + item.es + '</div>' +
    '<div class="zh">' + item.zh + '</div>' +
    '<div class="en">' + item.en + '</div>' +
    '<div class="speak-btn">🔊</div>';

  (function(es, zh) {
    card.addEventListener('click', function() {
      speak(es);
      showToast(es + ' = ' + zh);
      card.classList.remove('card-pop');
      void card.offsetWidth;
      card.classList.add('card-pop');
    });
  })(item.es, item.zh);

  return card;
}

var current = 'numbers';

function renderGrid(cat) {
  current = cat;
  document.getElementById('searchInput').value = '';
  var grid = document.getElementById('grid');
  grid.className = 'grid cat-' + cat;
  grid.innerHTML = '';
  var items = data[cat].items;
  for(var i = 0; i < items.length; i++) {
    var delay = i * 0.025;
    if(delay > 0.5) delay = 0.5;
    grid.appendChild(buildCard(items[i], cat, delay));
  }
  var tabs = document.querySelectorAll('.tab');
  for(var j = 0; j < tabs.length; j++) {
    tabs[j].classList.toggle('active', tabs[j].getAttribute('data-cat') === cat);
  }
}

function renderSearch(q) {
  var grid = document.getElementById('grid');
  grid.className = 'grid cat-search';
  grid.innerHTML = '';
  var tabs = document.querySelectorAll('.tab');
  for(var i = 0; i < tabs.length; i++) { tabs[i].classList.remove('active'); }
  var count = 0;
  for(var cat in data) {
    var items = data[cat].items;
    for(var j = 0; j < items.length; j++) {
      var item = items[j];
      if(item.es.toLowerCase().indexOf(q) > -1 || item.zh.indexOf(q) > -1 || item.en.toLowerCase().indexOf(q) > -1) {
        grid.appendChild(buildCard(item, cat, count * 0.02));
        count++;
      }
    }
  }
  if(count === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#ccc;padding:40px">找不到 · not found 😅</div>';
  }
}

function renderTabs() {
  var bc = document.getElementById('tabs-basic');
  var vc = document.getElementById('tabs-vocab');
  for(var key in data) {
    var val = data[key];
    var t = document.createElement('button');
    t.className = 'tab' + (key === current ? ' active' : '');
    t.setAttribute('data-cat', key);
    t.textContent = val.label;
    (function(k){ t.addEventListener('click', function(){ renderGrid(k); }); })(key);
    (val.group === 'basic' ? bc : vc).appendChild(t);
  }
}

var searchTimer;
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(searchTimer);
  var q = this.value.trim().toLowerCase();
  if(!q) { renderGrid(current); return; }
  searchTimer = setTimeout(function(){ renderSearch(q); }, 220);
});

renderTabs();
renderGrid(current);
</script>
